front:
  text: 重陽分梨十化集卷下交八
  hash: sha256:94ace11f12c84c631ff4238b2ba1fe70d4abe47a9fcbc0b4248ef80e987700ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0057_HFL_002-001a, image: hfl/0796/0796-096.png}
body:
  text: 終南山重陽子王哲撰黃鶴洞中仙你待堅心走我待堅心守栗子甘甜美芋頭翁母同張口開取四時花綻取三春柳一性昭然全得他玉液瓊漿酒丹陽繼韻不敢心狂走極謝師真守芋栗今番六次餐美味常甘口不作東牟叟不戀東風柳參從風仙物外遊共飲長生酒黃河清根固源澄宜鎖户清清堅守深洞轉加溫暖悉屏嚴凝寒凍别是風流雅致頓知得超升管中得自然開悟長生遇玉花正好拈弄元初本有真靈明明處這回搜見鉛汞便令結就一粒金丹堪貢顯現祥光瑞耀更來往隨鸞引鳳十洲三島神仙喜慶迎共羾丹陽次韻師父專專封閉户非干固濟雲洞亦非誇衒能受三冬飢凍為我愚頑戀俗用機化玄言必中等待子自悟知其遇捨家物外拿弄怡然頓覺元初捐塵纍便烹鉛更烹汞於澄湛中保養神珠為貢直待功成行滿恁時節携雲跨鳳赴蓬萊島仙童遠遠來迎羾憶王孫分明七寶更休論七座門開各有門一四一三各彼吞返陽魂便是長生保命存丹陽繼韻風仙師父妙談論說透無為清淨門舌上甘津味得吞溉精魂陰裏陽生萬劫存玉京山失笑迷陰化不來頑愚心鎖硬怎生開直饒富貴沒殃灾天年限終久落輪回鬼使早相催兒孫難替得有何推恁時悔恨哭聲哀方知道學道是仙材丹陽又韻慷慨男兒跳出來名韁并利鎖豁然開宜乎了幹死生灾超彼岸休望再頭回師父教言催道裝當結裹沒心推任教妻子哭哀哀關西去做箇駕雲材臨江仙栗子味招全道子真人訓馬先生法名通一字全道道號無憂子芋頭滋味引回頭各人喫了並無憂四三通十二箇箇下重樓喫得過時冰是水水中兩點浮漚一來一去幾時休若教同我願管取得真修丹陽繼韻大悟立身蓑笠好遇投相應回頭訓豫全道號無憂慧眸觀玉洞雲步上瓊樓赤鴈頭鑽清晏地白鷗足捧浮漚兩般混合最休休要除三界苦堪把一靈修黃河清按一百八數九曲黃河分九轉洪波大浪清淨九江共同合就俱來歸正九鼎中間顯現九宫闡端流一定玉翻金潑盈盈處倒侵九曜開影九霄翠碧相齊九臯有鶴鳴迎接精瑩九光洞明返照靈輝堪竝九曲神珠跳躍九仙至如然游泳湛殫澄徹成功行九天通聖丹陽繼韻九曲黃河流轉九陽陰逆順清淨九池之內涌出龍泉端正九會亘初湛寂九關現靈波永定美芝祥瑞天然秀九莖自是無影九霞覆鼎澄輝九還火鍊神丹轉光瑩九玄祖先要救攀仙肩竝九九重陽口訣暗傳得非凡游泳纍真功行將來去九霄參聖臨江仙八卦分明鋪擺定二人各四陽陰中間玄妙細搜尋若能知此味便是得真金恬淡隱藏清與淨甜甘却顯佳音八都山上出高岑正當堪眺望方是好登臨丹陽次韻八識通知心已定遍觀物物皆陰不如留意則追尋水中間養火玉內要生金直待陽純丹不漏恁時可稱知音超然雲步上瑶岑不勞極目望自見好光臨詩與丹陽百日扃門意已投定須堪可作朋儔馬猿返性緣攀戀桃杏為人也害羞從此果能成决斷端然真箇好因由撑篙已在中流裏難下逍遙得岸舟丹陽繼韻今朝誓狀謹相投做箇灰心物外儔鍊氣頤神常有樂上街展手略無羞擘開世網歸真趣跳出樊籠得自由參從本師雲水去逍遙坦蕩駕神舟絶句謾說修行學大道切須先向身中考勸公第一莫多情天若有情天也老丹陽次韻得遇明師歸正道回光返照心頭考自然開悟絶塵情箇內修完仙不老莫思鄉贈丹陽栗子味堪收更出馨香是芋頭今後喫時思想定追求為甚般般各六籌細認細尋搜芋有青苗栗有空外地中歸一處休休說破玄玄你越愁丹陽繼韻意馬下功收不放心猿暫出頭一點靈明歸太素何求通六幽微罷運籌芋栗更間搜知味聞香識破須向空中尋響喨無休真樂真歡散盡愁贈孫姑在家只是二婆呼出得家緣沒火爐若會修行成煆鍊教人永永唤仙姑望蓬萊逢九變逢九變須用寶刀裁陰魄莫隨魔鬼轉陽魂合趕好梨來今已免輪回公聽取公聽取道眼正堪開四假身軀宜煆鍊一靈真性細詳猜有分看蓬萊丹陽次韻通真九通真九箇內下功裁便使龍蛇騰地去却教雲鶴下天來晨看暮潮回白蓮綻白蓮綻自有碧蓮開清淨門中通出入無為路上免搏猜定是到蓬萊丹陽問余不住飲冷水何故答曰我自甘河得遇純陽真人因飲水焉故作是詞害風飲水知多少因此通玄妙白麻衲襖布青巾好模好樣真箇好精神不須鏡子前來照事事心頭了夢中識破夢中身便是逍遙達彼岸頭人丹陽繼韻馬風得遇心塵少通得玄中妙自然恥戴皂羅巾真息綿綿營養不神神慧燈不住通天照性命須當了金爐便是鍊丹身坦蕩逍遙做箇散間人蘂珠宫栗子二三箇這芋頭的端六箇分付清間唯兩箇尋思箇甘甜味怎生箇五臟明明箇又六腑不差些箇更有金丹此一箇十二箇請翁婆會則箇丹陽繼韻芋栗又分六箇遇投三謂懷真箇芋者遇也投三者真人乃三官人也立子三人總忘箇栗者立也豫子三人皆長立故有是句細搜尋就中認箇中箇性月圓圓箇真歡樂不愁些箇或問扶風因甚箇報君知捨那箇得這箇贈丹陽莫慮王風冷王風自不寒百朝欻地過出路你咱看丹陽繼韻有漏常愁冷無情不覺寒要通雲外境捨俗慧眸看感皇恩百日鎖庵門分梨十化間間澄中淨養真假箇人嘆問直受如斯瀟灑我咱知得也誠清雅别有一般分明好畫頻頻親擎出暫懸挂那悶要看萬斛珍珠酬價恁時傳說下些兒話丹陽次韻鍾吕遣風仙專行教化故鎖庵門即非假用機誘我暗剔靈明惺灑脫家風狂做棄儒雅直箇內容難描難畫六銖衣光彩體披掛手擎丹顆瑩塋光明無價蓋因傳得些非常話報師恩為何不倦寫詩詞這箇明因只自知一筆書開直正覺三田般過的端慈回光返照緣觀景固蒂深根恰及時密鎖玄機牢閉户唤來便去赴瑶池丹陽次韻今朝跪領本師詩祕密玄機喜得知勘破萬緣忘假相滌除六欲起真慈男婚女嫁休心日意滅情忘捨俗時恭從吾師雲水去將來决定到天池贈丹陽酒初醒夢初驚月初明性初平如覺悟是前程丹陽次韻醉中醒睡中驚暗中明箇中平心開悟得前程誓丹陽子孫入道七祖出離地獄子孫得道九祖生天如退道纍祖先悟南柯芋栗今番徹賢愚兩共餐一能陽氣做團團一箇沉淪陰魄愈摧殘來者歸清淨迷人俗冗盤通全跳入好仙壇恰恰同居吉吉永相看丹陽次韻立遇心通徹清香味得餐水中紅焰結成團雪裏瓊花爛漫不凋殘性燭明金闕神丹晃玉盤齊修六度與三壇出自吾師內景自然看絶句二婆只識世間居不識蓬瀛有玉壺若肯回頭修覺悟名傳永永唤仙姑玉堂春玉性金真人人皆可化玉液金丹頻頻迎迓玉兔金烏光光相次亞照玉欄杆種玉芽玉蘂金莖長長生不謝玉女金童常常看舍玉鎖金匙門門開闡下賞玉堂春對玉花丹陽繼韻玉悟金通心心從教化玉虎金龍時時相迓玉灩金波澄澄成次亞見玉溪中産玉芽玉葉金枝榮榮無朽謝玉姹金嬰間間看舍玉户金關明明開上下唱玉堂春賞玉花重陽真人分梨十化集卷下
