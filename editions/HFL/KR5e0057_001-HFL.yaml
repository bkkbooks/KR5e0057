front:
  text: 重陽分梨十化集卷上
  hash: sha256:eca0bab938d42c49b382d433feee5c112ee03463a8c0326874b02d00a6bb5f0a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0057_HFL_001-001a, image: hfl/0796/0796-072.png}
body:
  text: 終南山重陽子王嚞譔水雲遊且住且住十月小春當宜鎖户一百日鍊就重陽也並無作做渾身要顯唯真素掛靈明紙布信任他走玉飛金自恬然不顧丹陽繼韻不住不住火院當離深宜别户害風仙化我扃門這修行須做腥羶戒盡常餐素掛體唯麻布待百朝鎖鑰開時效吾師内顧贈丹陽絶句成一今朝正一時渾梨滋味怎生知若能會飲西江水直與王風緊厮隨丹陽次韻風仙成日鎖庵時賜我渾梨味頗知心已離家雲水去道通秘奥虎龍隨水雲遊玉性玉性玉鎖緊嚴金關牢釘玉房深百日清清玉輝光一併玉匙開闡通仙徑玉門中傳令玉童來便許全真玉皇宣已定丹陽繼韻玉性玉性玉户牢封金門緊釘玉房中見箇驪龍玉虎來吞併玉關能啓通捷徑玉童傳宣令玉皇天至矣無私玉詔今番定贈丹陽夫婦唯公芋栗兩般餐道味應同此味甘六六正當呼十二前三三與後三三丹陽次韻芋栗今朝喜得餐滋味如同玉液甘箇内修完三十六世上争知十有三贈孫姑二婆猶自戀家業家業誰知壞了錢若是居家常似舊馬公無分做神仙贈丹陽夫婦十一離分馬秀才直須款款認頭迴三塗苦楚安排放兩塊泥團總不猜棚下冷言無活計樓頭暗應没家財願惺願悟休相唤便是教賢出得來丹陽繼韻風仙得道禀高才落筆成章釣我迴一性不教塵裏昧三光須向箇中猜真心悟後忘人我慧眼開時棄色財今日又知離子味有縁拂袖不歸來贈丹陽背上葫蘆酒滿沽無中却有有中無清光滑辣般般識月裏瓊林永不枯丹陽繼韻瓊漿玉液不須沽舌上甘津不暫無傳得風仙澆溉法靈苗慧草永難枯贈丹陽夫婦芋栗粟子前來看芋頭二人共食過重樓三三便得三三味六六須知六六由用劍能揮身外影將針會捉水中漚饒君做盡千般計怎免荒郊一土丘丹陽又韻從今垢面更蓬頭不憶歌歡舊酒樓趖避家中冤業債追陪物外好因由嗟身有似風前燭歎命還如水上漚得遇修真生正覺免教一性卧荒丘水雲遊思筭思筭四假凡軀干甚厮翫元來是走骨行屍更誇張體段靈明慧性真燦爛這骨骰須换害風子不藉人身與神仙結伴丹陽繼韻思筭思筭妻妾兒孫休來戲翫這冤親繫脚繩兒宜一刀兩段靈源悟徹元燦爛這一番更换馬風子辭别家鄉與風仙作伴分梨詩三塊滅三塗人人一二餔味能枯北海香會透西湖玉浪溶溶滚金波密密鋪恰如文義顯全在者之乎丹陽繼韻一遇出泥塗沖和味得餔龍吟震山谷虎嘯透江湖欲要金丹結須教玉篆鋪通斯咸變化何況於人乎爇心香坐殺王風立殺扶風只因伊貪戀家風争如猛捨認取清風好同行好同坐共携風我即真風你即佯風小春天總賴温風將來雪下怎奈寒風窗兒裏門兒外兩般風丹陽次韻此箇扶風幼習儒風遇風仙傳得清風風狂便做總笑余風這風風風風得煞似心風脫俗宜風離境收風向玄關要捉雲風香風不斷悅我松風待好風來靈風至便乘風與丹陽芋栗遺賢往不還休心何用在機關常怜家計爲縈絆怎得身軀暫處閑一對沉毬頻輥轉兩團猫食最癡頑若教會得清凉語也許隨余住好山丹陽繼韻便尋出計不思還打破氣財酒色關滅火消煙永遇樂立身行道放心閑須教己後成功行豈敢依前放軟頑大抵男兒憑志氣將來决定住三山恣逍遥若要修行須當子細把金關玉門牢閉上下沖和位交溉濟得來後惺惺又同猜謎輥入虚空却投根蔕毫光在爛銀霞際五彩新鮮直靈瑩膩分明徹浄清闃然細細丹陽繼韻二氣綿綿調來細細向瓊壺裏頭封閉子午宫前玉金周濟這玄妙分明免教商謎天上靈苗海中根蔕霞光布燦無涯際忽見真容如同玉膩通元始修行在乎子細與丹陽害風遊歷水和雲六葉輪迴鐵板分敲遍世間俱不曉心知唯有箇人聞丹陽次韻寶瓶宫裏看祥雲雲去雲來邪正分分劈心琴成曲調調高聲韻自然聞與丹陽一箇渾梨作四分翁婆共啖莫紛紛梨分不爲分離事果結須看結裹文水湧頻教烏兔飲火來休把赤心焚若通水火成顛倒冷淡清閑自喜聞丹陽繼韻分梨悟到四離分漸覺心灰性不紛妙妙虎龍寧有說玄玄金玉豈關文靈苗宜向火中溉慧草堪於水裏焚直待大丹丹不漏真消真息自然聞神光燦金關叩户玉鎖扃門閑裏不做修持杳默昏冥誰會舞弄嬰兒睡則擒猿捉馬醒來後復採瓊芝每依時這功夫百日只許心知自在消遥做就唯舒展紅霞光彩敷披罩定靈明方見本有真慈一粒神丹結正三重焰緊緊相隨過瑶池透青霄頂上無爲丹陽繼韻風仙鎖户馬鈺辭巢寂然澹乎自持了幹根源豈肯攀戀妻兒識破氣財酒色憑清浄固養靈芝當下手暗修完功行不許人知隱密藏機蓄響便須當做箇玉褐懷披潑殺無明火燭自是心慈忍辱得何味況善芽生仙佛常隨通玄妙這真功却是無爲與丹陽栗與芋芋與栗兩般滋味休教失性與命命與性兩般出入通賢聖都要知都要知便是長生固蔕時休想瑶臺并閬苑六家珍寶出天池丹陽繼韻重陽仙設芋栗贈我夫妻莫前失要知命要知性從此超凡要入聖妙玄知妙玄知身中子午倒顛時水鄉無漏金丹結自然雲步赴瑶池真歡樂便把户門安鎖鑰内更藴最奇略安鑪竈鍛鍊金精養元神修完丹藥二粒圓成光灼灼虚空外往來盤礴五彩總扶持也無施無作冥冥杳杳非投託占盈盈赴盟約蓬萊路永結前期定長春瑶芳瓊萼等接清凉光徧爍放馨香自然雯作裏面禮明師現真歡真樂丹陽次韻酒色氣財關遠鑰事務簡當而略方堪可水裏尋金固元初修持仙藥鍛鍊須教明更灼祥煙裊自然磅礴這箇好功夫並無些爲作昏昏默默無依託湛澄中有期約真消息只在靈臺對雲霞瓊林花萼燦爛光輝真漸爍性靈靈有何佳作闡大道清吟顯清歡清樂與丹陽今展誰曉五分裁陰二陽三口各開知味不遭三界苦通甘免却九幽灾乾坤未判何方住父母生前甚處來悟得此因成大覺從今款款鍊靈臺丹陽繼韻攀緣斷制自心裁心地開時性亦開返照只知家業苦迴光頓覺火坑灾志隨靈鶴先歸去意在林泉不復來物外逍遥功行累丹成捧出上瑶臺爇心香這箇王風自小胎風大來後變做心風遍行遊歷正是狂風每閑閑處詩曲作似長風謁馬儒風說與仁風諕他成急急驚風亂爲下手鎖了防風便怎生醫得你破傷風丹陽又韻此箇扶風不會祥風遇風仙傳得玄風奇哉風味清浄家風這一般風風得好屏淫風施布仁風闡出祥風教風行處處聞風知風妙趣捨俗如風補破傷風風光好得真風與丹陽這番這番芋頭栗這迴須要知詳悉恰似餳和蜜五穀中來花蘂出甜則一般甜熱冷兩般怎生詰又似膠與漆皮膚中來樹裏汁粘則一般粘陽陰兩般如何述築箇環墻上有蓋四面無門何處入三歲孩兒娶了妻六十老翁無家室若能會得此機關摩訶般若波羅蜜省省省吉吉吉没口婆婆長叫屈頌曰故將亂道惑公心惑去惑來直到底惑得動時你是我惑不動時我是你丹陽繼韻風仙五次賜芋栗夫婦同餐各知悉大道如同餳與蜜攀戀宜乎家跳出清清滋味忒甘甜難說難言不可詰俗情恰似膠與漆攀戀無異飲銅汁猛悟迴頭無𦂍粘物外超然閑著述不羨榮華車與蓋衆妙之門深走入無中嬰姹結夫妻日月交光晃神室從今達達玉玄關般若波羅蜜中蜜省省省吉吉吉一靈真性無沉屈頌曰凡心滌盡見真心澆溉靈根雲脚底自然陡頓忘人我始覺元初父母你玉花洞要知端的默默細想須憑因果致令喜悅投歸玄妙便把門兒鎖惺惺了了真堪可有自然香火浄中寂𨵙分明一箇師父來看我丹陽繼韻得其真遇怎敢怠慢勤修功果緊擒意馬無令顛劣便把心猿鎖逢魔逢難全然可蓋謂舞煙火本師說破元初這箇争甚閑人我無夢令今則與公照燭無夢令中詳録古聖富春詩六白瑩光如玉丁屬丁屬三塊各人知足丹陽次韻師父今朝傳燭塵事不堪齒録離别富春姑各自鍊烹金玉聽屬聽屬了了真如願足爇心香謔號王風實有仙風性通禪釋貫儒風清談吐玉落筆如風解著長篇揮短句古詩風斤運成風鵬化摶風恣雲遊列禦乘風冬寒閉户念見高風更坐無鑪眠無被任霜風丹陽繼韻仙侣王風來化扶風啓虔誠特顯家風出神入夢跨鶴乘風要馬風風風取信便隨風見景投風藉甚儒風脫家緣故做心風不迷假相直認真風更捉風颷乘風馬駕雲風重陽分梨十化集卷上
