body:
  text: 丹陽先生系出扶風大辨之宗親也家貲鉅萬子孫詵詵自幼業儒不爲利祿謹性好恬澹樂虛無嘗謂其人曰我因夢遇異人笑中得悟大定丁亥秋果有重陽眞人别終南遊海島欲結知友同赴蓬萊共禮本師之約東抵寧海首往范明叔之遇仙亭丹陽繼至參謁眞人一見驩然昔傾蓋目擊而道存知丹陽夙有仙契遂丁寧勸以學道修眞丹陽識其諄誨敬請眞人諧至郡城居之南庵命其名曰全眞日夕與之講道於其中必欲丹陽夫婦速修持棄空緣離鄕井爲雲水遊其初夫婦易從也眞人誓鏁庵百日是孟冬初吉賜渾梨令丹陽食之每十日索一梨分送於夫婦自兩塊至五十五塊每五日又賜芋栗各六枚及重重入夢以天堂地獄十犯大戒罪警動之每分送則作詩詞或歌頌隱其微旨丹陽悉皆酬和達天地陰陽奇偶之數明性命禍福生死之機由是屏俗累改衣冠焚誓狀夫婦信嚮而師焉逮己丑歲從眞人西歸至梁汴間居閱歲眞人蟬蛻仙去丹陽盡傳其道廼與其徒西走終南訪眞人舊隱築環堵而居之十稔宗闡其教徒弟雲集不可勝數歲在壬寅丹陽飛錫東來復還鄕邦一日語諸門人曰眞人乎昔著述已有全眞前後集又其遊吾鄕時所著類皆玄談妙理裒集得三百餘篇分爲三帙上曰下手遲中曰分梨十化下曰好離鄕此集關西雖已刊印然傳到鄕者何其罕邪門人共對曰眞人向至寧海化師父寔其根始他處尚且刊行况鄕中乎當重加校證編次亦作三帙命工縷板以廣其傳丹陽門人靈眞子朱抱一携是集訪余謂余曰鄕老先生范趙劉三公已作總序每帙別求爲序引余答曰僕方且對燈窗事雕篆以謀進身繼箕裘之緒得無媿於忘名利出塵世者乎然自謂爲兒童時素識丹陽有慕道之心又親覩眞人鏁庵勸化之事不能以淺陋辭因留其分梨十化一帙故樂出是言庶使四方嚮道之士知全眞之教有利於人也大矣若夫二先生戒勸之文神異之跡其他記序歌詩載之已詳姑敘其丹陽夫婦出家入道之本末云時大定癸卯歲寧海州東牟鄕貢進士馬大辨謹序
